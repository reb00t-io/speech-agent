name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: grep '^export ' .envrc | sed -e 's/^export //' -e 's/="\(.*\)"/=\1/' >> "$GITHUB_ENV"
      - run: ./scripts/build.sh linux/amd64
      - run: ./test/e2e.sh
        env:
          SKIP_DOCKER_BUILD: 1
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          API_KEY: ${{ secrets.API_KEY }}

# Deployment is intentionally not part of CI — deploy manually with
# ./scripts/deploy.sh. To re-enable auto-deploy, add the DEPLOY_SSH_KEY,
# LLM_BASE_URL, LLM_API_KEY, API_KEY, and AUTH_PASSWORD repository secrets
# and restore the SSH setup + ./scripts/deploy.sh steps.
