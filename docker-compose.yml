services:
  speech-agent:
    image: speech-agent
    environment:
      - PORT=${PORT}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - ASR_MODEL=${ASR_MODEL}
      - ASR_LANGUAGE=${ASR_LANGUAGE}
      - API_KEY=${API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - TTS_MODEL=${TTS_MODEL}
      - TTS_VOICE=${TTS_VOICE}
      - BARGE_IN_THRESHOLD_RMS=${BARGE_IN_THRESHOLD_RMS}
      - BARGE_IN_MIN_MS=${BARGE_IN_MIN_MS}
      - DUAL_LLM_ENABLED=${DUAL_LLM_ENABLED}
      - LLM_MAX_COMPLETION_TOKENS=${LLM_MAX_COMPLETION_TOKENS}
      - LLM_DEFAULT_REASONING_EFFORT=${LLM_DEFAULT_REASONING_EFFORT}
      - MEMORY_ENABLED=${MEMORY_ENABLED}
      - MEMORY_STORE_ENABLED=${MEMORY_STORE_ENABLED}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS}
      - QDRANT_LOCATION=${QDRANT_LOCATION}
      - MEMORY_ORG_ENABLED=${MEMORY_ORG_ENABLED}
      - MEMORY_MEMBER_ID=${MEMORY_MEMBER_ID}
      - MEMORY_ROLE=${MEMORY_ROLE}
      - MEMORY_ORG_PROFILE=${MEMORY_ORG_PROFILE}
      - MEMORY_ORG_ROLES=${MEMORY_ORG_ROLES}
      - MEMORY_ORG_WRITER_ROLES=${MEMORY_ORG_WRITER_ROLES}
      - MEMORIZER_DATA_DIR=/data/memory
      - SESSIONS_PATH=/data/sessions.json
      - REQUEST_LOG_PATH=/data/requests.log
      - DOWNLOADS_DIR=/data/downloads
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ${HOME}/.bootstrap-template/data:/data
