services:
  speech-agent:
    image: speech-agent
    environment:
      - PORT=${PORT}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - ASR_MODEL=${ASR_MODEL}
      - ASR_LANGUAGE=${ASR_LANGUAGE}
      - API_KEY=${API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - TTS_MODEL=${TTS_MODEL}
      - TTS_VOICE=${TTS_VOICE}
      - BARGE_IN_THRESHOLD_RMS=${BARGE_IN_THRESHOLD_RMS}
      - BARGE_IN_MIN_MS=${BARGE_IN_MIN_MS}
      - DUAL_LLM_ENABLED=${DUAL_LLM_ENABLED}
      - LLM_MAX_COMPLETION_TOKENS=${LLM_MAX_COMPLETION_TOKENS}
      - LLM_DEFAULT_REASONING_EFFORT=${LLM_DEFAULT_REASONING_EFFORT}
      - SESSIONS_PATH=/data/sessions.json
      - REQUEST_LOG_PATH=/data/requests.log
      - DOWNLOADS_DIR=/data/downloads
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ${HOME}/.bootstrap-template/data:/data
