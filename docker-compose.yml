services:
  speech-agent:
    image: speech-agent
    environment:
      - PORT=${PORT}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - ASR_MODEL=${ASR_MODEL}
      - API_KEY=${API_KEY}
      - SESSIONS_PATH=/data/sessions.json
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ${HOME}/.bootstrap-template/data:/data
